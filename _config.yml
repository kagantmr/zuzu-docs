title: zuzu
description: the Scottish Fold microkernel
url: https://kagantmr.github.io
abi_source: https://github.com/kagantmr/zuzu/blob/zuzu-v1.0.0-loaf/include/zuzu
baseurl: /zuzu-docs
permalink: pretty

collections:
  syscalls:
    output: true
    permalink: /abi/syscall/:path/
  sync:
    output: true
    permalink: /sdk/sync/:name/

defaults:
  - scope: {path: "", type: syscalls}
    values:
      layout: syscall
      section: ABI
      parent_title: Syscall table
      parent_url: /abi/syscall-table/
  - scope: {path: "", type: sync}
    values:
      layout: primitive
      section: SDK
      parent_title: Sync primitives
      parent_url: /sdk/sync/
  - scope: {path: ""}
    values: {layout: page}

kramdown:
  input: GFM
exclude: [Gemfile, Gemfile.lock, README.md, JEKYLL_MIGRATION_BRIEF.md]
